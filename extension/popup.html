<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PokerGTO</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Meiryo', sans-serif;
  background: #1a1a2e;
  color: #eee;
  width: 300px;
  padding: 20px;
}
h1 { font-size: 16px; color: #e94560; margin-bottom: 3px; }
.sub { font-size: 11px; color: #556; margin-bottom: 18px; }

/* ─── ログイン前 ─── */
#view-login { display: block; }
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 11px;
  background: #fff;
  color: #333;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-google:hover { background: #f0f0f0; }
.btn-google img { width: 18px; height: 18px; }

/* ─── ログイン後 ─── */
#view-main { display: none; }
.user-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid #1e2535;
}
.live-dot {
  width: 7px; height: 7px;
  background: #4caf93;
  border-radius: 50%;
  flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.user-email { font-size: 11px; color: #778; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-logout {
  background: transparent;
  border: 1px solid #333;
  border-radius: 5px;
  color: #556;
  font-size: 10px;
  padding: 3px 7px;
  cursor: pointer;
  flex-shrink: 0;
}
.btn-logout:hover { border-color: #e94560; color: #e94560; }

/* ─── 蓄積ハンド数 ─── */
.hand-count-row {
  text-align: center;
  margin-bottom: 18px;
}
.hand-count-num {
  font-size: 42px;
  font-weight: 700;
  color: #e94560;
  line-height: 1;
}
.hand-count-unit { font-size: 15px; color: #9ab; margin-left: 2px; }
.hand-count-label { font-size: 11px; color: #556; margin-top: 3px; }

/* ─── メインボタン ─── */
.btn-open {
  width: 100%;
  padding: 14px;
  background: #e94560;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 10px;
}
.btn-open:hover { background: #c73652; }

/* ─── ステータス ─── */
.status {
  font-size: 11px;
  color: #556;
  text-align: center;
  min-height: 16px;
}
.status.error { color: #e94560; }
.status.success { color: #4caf93; }

/* ─── 自動解析バッジ ─── */
.auto-badge {
  display: none;
  align-items: center;
  gap: 6px;
  background: #1a3a1a;
  border: 1px solid #2d6a2d;
  border-radius: 8px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 11px;
  color: #5cb85c;
}
.auto-badge.visible { display: flex; }
</style>
</head>
<body>
<h1>🃏 PokerGTO</h1>
<p class="sub">T4ハンドログを自動取得中</p>

<!-- ログイン前 -->
<div id="view-login">
  <button class="btn-google" id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Googleでログイン
  </button>
  <p class="status" id="login-status"></p>
</div>

<!-- ログイン後 -->
<div id="view-main">
  <div class="user-row">
    <div class="live-dot"></div>
    <span class="user-email" id="user-email"></span>
    <button class="btn-logout" id="btn-logout">ログアウト</button>
  </div>

  <!-- 蓄積ハンド数 -->
  <div class="hand-count-row" id="hand-count-row">
    <div style="font-size:12px;color:#556">読み込み中...</div>
  </div>

  <!-- 自動解析通知 -->
  <div class="auto-badge" id="auto-badge">
    <span>⚡</span>
    <span id="auto-badge-text">100手蓄積 → 自動解析を実行中</span>
  </div>

  <button class="btn-open" id="btn-open-site">📊 PokerGTOを開く</button>
  <p class="status" id="main-status"></p>
</div>

<script src="popup.js"></script>
</body>
</html>
