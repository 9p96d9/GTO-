name: Debug EC2

on:
  push:
    paths:
      - '.github/workflows/debug-ec2.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            echo "=== ERROR LOGS ==="
            docker logs gto-app --since 72h 2>&1 | grep -E "ERROR|Exception|Traceback|500|cb880d75" | tail -50
            echo "=== JOB IN DB ==="
            docker exec gto-postgres psql -U gto_user -d postgres -c "SELECT job_id, created_at FROM analyses WHERE job_id='cb880d7597de4d7992d40e9fe53b1c2b';"
