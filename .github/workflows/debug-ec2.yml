name: Debug EC2

on:
  push:
    paths:
      - '.github/workflows/debug-ec2.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            docker logs gto-app --since 48h 2>&1 | grep -E 'ERROR|Exception|Traceback|classify_result|500' | tail -80
            echo "---DB CHECK---"
            docker exec gto-postgres psql -U gto_user -d postgres -c "SELECT job_id, created_at FROM analyses ORDER BY created_at DESC LIMIT 3;"
