name: Debug EC2

on:
  push:
    paths:
      - '.github/workflows/debug-ec2.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            echo "=== ディスク使用量 ==="
            df -h /
            echo "=== Docker使用量 ==="
            docker system df
            echo "=== 不要イメージ削除 ==="
            docker image prune -a -f
            echo "=== 削除後ディスク ==="
            df -h /
