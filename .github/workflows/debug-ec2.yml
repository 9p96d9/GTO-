name: Debug EC2

on:
  push:
    paths:
      - '.github/workflows/debug-ec2.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            echo "=== RECENT REQUESTS ==="
            docker logs gto-app --since 48h 2>&1 | grep -v "wp-\|xmlrpc\|\.php\|bypass\|install\|robots\|sitemap" | tail -60
            echo "=== HAND COUNT PER ANALYSIS ==="
            docker exec gto-postgres psql -U gto_user -d postgres -c "SELECT a.job_id, a.created_at, COUNT(ah.id) as hands FROM analyses a LEFT JOIN analysis_hands ah ON a.id=ah.analysis_id GROUP BY a.job_id, a.created_at ORDER BY a.created_at DESC LIMIT 5;"
