name: Debug EC2

on:
  push:
    paths:
      - '.github/workflows/debug-ec2.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Run command on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          capture_stdout: true
          script: |
            docker logs gto-app --since 10m 2>&1 | grep -v "wp-\|\.php\|xmlrpc\|bypass" | grep -E "ERROR|500|Exception|classify_result_page|job:" | tail -40
