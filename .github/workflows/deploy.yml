name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: gto-app
  ECR_REGISTRY: 273949555510.dkr.ecr.ap-northeast-1.amazonaws.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin 273949555510.dkr.ecr.ap-northeast-1.amazonaws.com
            docker pull 273949555510.dkr.ecr.ap-northeast-1.amazonaws.com/gto-app:latest
            docker stop gto-app || true
            docker rm gto-app || true
            docker run -d \
              --name gto-app \
              --restart unless-stopped \
              --env-file /home/ec2-user/gto.env \
              -p 5000:5000 \
              273949555510.dkr.ecr.ap-northeast-1.amazonaws.com/gto-app:latest
