<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokerGTO — ログイン</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --red: #e94560; --red-dim: rgba(233,69,96,0.15);
    --text: #e0e0e0; --text-muted: #7a8099; --text-dim: #4a5168;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  .glow {
    position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse at center, rgba(233,69,96,0.1) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 400px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    text-align: center;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
  }
  .logo {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 800;
    letter-spacing: -0.5px; color: var(--text); text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .logo span { color: var(--red); }
  .sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 36px; line-height: 1.6; }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px;
    background: #fff; color: #333; border: none; border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .btn-google:hover { background: #f5f5f5; transform: translateY(-1px); }
  .btn-google img { width: 20px; height: 20px; }
  .status { margin-top: 16px; font-size: 0.82rem; color: var(--text-muted); min-height: 20px; }
  .status.error { color: var(--red); }
  .back-link { display: block; margin-top: 28px; font-size: 0.78rem; color: var(--text-dim); text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: var(--text-muted); }
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <a href="/" class="logo"><span>♠</span>Poker<span>GTO</span></a>
  <p class="sub">Googleアカウントでログインしてください</p>
  <button class="btn-google" id="btn-login">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Googleでログイン
  </button>
  <p class="status" id="status"></p>
  <a href="/" class="back-link">← ホームに戻る</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const cfg = await fetch("/api/firebase-config").then(r => r.json());
  const app  = initializeApp(cfg);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) window.location.href = "/sessions";
  });

  document.getElementById("btn-login").addEventListener("click", async () => {
    const st = document.getElementById("status");
    st.textContent = "ログイン中...";
    st.className = "status";
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    } catch (e) {
      st.textContent = "ログイン失敗: " + e.message;
      st.className = "status error";
    }
  });
</script>
</body>
</html>
