<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>解析中... — PokerGTO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
    --red: #e94560; --red-dim: rgba(233,69,96,0.15);
    --green: #4caf93; --green-dim: rgba(76,175,147,0.1);
    --text: #e0e0e0; --text-muted: #7a8099; --text-dim: #4a5168;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 44px 48px; width: 100%; max-width: 500px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    text-align: center;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .card-title {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700;
    color: #fff; letter-spacing: -0.3px; margin-bottom: 6px;
  }
  .status-msg { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 24px; min-height: 20px; }
  .progress-bar-wrap {
    background: rgba(0,0,0,0.4); border-radius: 99px;
    height: 5px; overflow: hidden; margin-bottom: 6px;
  }
  .progress-bar {
    height: 100%; background: var(--red); border-radius: 99px;
    transition: width 0.5s ease; width: 5%;
    box-shadow: 0 0 8px rgba(233,69,96,0.5);
  }
  .elapsed { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 28px; }
  .steps { display: flex; flex-direction: column; gap: 8px; text-align: left; }
  .step {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 10px;
    background: rgba(0,0,0,0.25); font-size: 0.875rem; color: var(--text-dim);
    transition: all 0.3s; border: 1px solid transparent;
  }
  .step.active { background: var(--red-dim); color: var(--text); border-color: rgba(233,69,96,0.25); }
  .step.done   { background: var(--green-dim); color: var(--green); border-color: rgba(76,175,147,0.2); }
  .step-icon { width: 22px; text-align: center; flex-shrink: 0; font-size: 0.95rem; margin-top: 1px; }
  .step-body { flex: 1; }
  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(233,69,96,0.3); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 540px) { .card { padding: 28px 20px; } }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">🃏 解析中...</div>
  <p class="status-msg" id="msg">処理を開始しています...</p>
  <div class="progress-bar-wrap"><div class="progress-bar" id="pbar"></div></div>
  <p class="elapsed" id="elapsed"></p>
  <div class="steps">
    <div class="step active" id="step1">
      <span class="step-icon" id="icon1"><span class="spinner"></span></span>
      <div class="step-body"><span id="label1">ハンド履歴をパース中...</span></div>
    </div>
    <div class="step" id="step2">
      <span class="step-icon" id="icon2">2</span>
      <div class="step-body"><span id="label2">青線/赤線を分類</span></div>
    </div>
  </div>
</div>
<script>
const JOB_ID = '{{ job_id }}';
let startTime = Date.now();
let sseActive = false;

setInterval(() => {
  const s = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(s / 60), sec = s % 60;
  document.getElementById('elapsed').textContent =
    m > 0 ? `経過時間: ${m}分${sec}秒` : `経過時間: ${sec}秒`;
}, 1000);

function setPbar(pct) { document.getElementById('pbar').style.width = pct + '%'; }
function markDone(n) {
  document.getElementById('step' + n).className = 'step done';
  document.getElementById('icon' + n).textContent = '✓';
}
function markActive(n) {
  document.getElementById('step' + n).className = 'step active';
  document.getElementById('icon' + n).innerHTML = '<span class="spinner"></span>';
}

const es = new EventSource('/stream/' + JOB_ID);
const fallbackTimer = setTimeout(() => {
  if (!sseActive) { es.close(); pollFallback(); }
}, 10000);

es.onmessage = function(e) {
  sseActive = true;
  clearTimeout(fallbackTimer);
  const d = JSON.parse(e.data);

  if (d.type === 'parse_done') {
    markDone(1);
    document.getElementById('label1').textContent =
      `ハンド履歴を解析しました（${d.hands_total}ハンド検出）`;
    markActive(2);
    setPbar(50);
    document.getElementById('msg').textContent = '青線/赤線を分類中...';

  } else if (d.type === 'classify_done' || d.type === 'done') {
    markDone(1); markDone(2);
    setPbar(100);
    document.getElementById('msg').textContent = '完了！結果を表示します...';
    es.close();
    setTimeout(() => { window.location.href = '/classify_result/' + JOB_ID; }, 500);

  } else if (d.type === 'error') {
    document.getElementById('msg').textContent = 'エラーが発生しました';
    es.close();
    setTimeout(() => { window.location.href = '/error/' + JOB_ID; }, 1000);
  }
};

es.onerror = function() {
  if (sseActive) return;
  es.close();
  clearTimeout(fallbackTimer);
  pollFallback();
};

async function pollFallback() {
  if (sseActive) return;
  try {
    const res  = await fetch('/status/' + JOB_ID);
    const data = await res.json();
    if (data.status === 'done') {
      window.location.href = '/classify_result/' + JOB_ID;
      return;
    }
    if (data.status === 'error') {
      window.location.href = '/error/' + JOB_ID;
      return;
    }
    const s = data.step || 0;
    setPbar(s >= 2 ? 50 : 10);
    if (s >= 1) markDone(1);
    if (s >= 2) markActive(2);
  } catch(_) {}
  if (!sseActive) setTimeout(pollFallback, 2000);
}
</script>
</body>
</html>
