<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エラー — PokerGTO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
    --red: #e94560; --red-dim: rgba(233,69,96,0.12);
    --text: #e0e0e0; --text-muted: #7a8099; --text-dim: #4a5168;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 20px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid rgba(233,69,96,0.2);
    border-radius: 20px; padding: 44px; width: 100%; max-width: 560px;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .err-title {
    font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700;
    color: var(--red); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  pre {
    background: rgba(0,0,0,0.4); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; white-space: pre-wrap; word-break: break-all;
    color: #f88; font-size: 0.78rem; line-height: 1.6; margin-bottom: 24px;
    max-height: 300px; overflow-y: auto;
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); font-size: 0.85rem; text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .back-link:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: rgba(255,255,255,0.07); }
</style>
</head>
<body>
<div class="card">
  <div class="err-title">&#x274C; エラーが発生しました</div>
  <pre>{{ log }}</pre>
  <a href="/" class="back-link">← ホームに戻る</a>
</div>
</body>
</html>
