<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>復元中... — PokerGTO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
    --red: #e94560; --text: #e0e0e0; --text-muted: #7a8099; --text-dim: #4a5168;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px; pointer-events: none; z-index: 0;
  }
  .box {
    position: relative; z-index: 1; text-align: center;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(233,69,96,0.2); border-top-color: var(--red);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 0.875rem; color: var(--text-muted); }
  .err { color: var(--red); font-size: 0.875rem; margin-top: 16px; display: none; }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 24px;
    padding: 9px 18px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-muted); font-size: 0.82rem; text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-back:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">解析結果をFirestoreから復元中...</div>
  <div class="err" id="err"></div>
  <a class="btn-back" href="/sessions">← セッション一覧に戻る</a>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const cfg  = await fetch("/api/firebase-config").then(r => r.json());
  const app  = initializeApp(cfg);
  const auth = getAuth(app);

  function showErr(msg) {
    document.getElementById("spinner").style.display = "none";
    const e = document.getElementById("err");
    e.textContent = msg; e.style.display = "block";
  }

  onAuthStateChanged(auth, async user => {
    if (!user) { window.location.href = "/login"; return; }
    try {
      const token = await user.getIdToken();
      const res = await fetch("/api/analyses/{job_id}/restore", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token },
      });
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        showErr(d.error || "復元に失敗しました"); return;
      }
      window.location.href = "/classify_result/{job_id}";
    } catch (e) {
      showErr("エラー: " + e.message);
    }
  });
</script>
</body>
</html>
